server:
  port: 8080
spring:
  application:
    name: "ScaffoldQuickStart"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
  data:
    mongodb:
      # Atlas requiere authSource=admin (los usuarios viven en la BD 'admin').
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://127.0.0.1:27017/test?authSource=admin}
      database: ${SPRING_DATA_MONGODB_DATABASE:test}
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: "livenessState"
        readiness:
          include: "readinessState"
  health:
    # Health check de Mongo deshabilitado: el ALB usa /actuator/health/liveness
    # para no derribar tasks por fallos transitorios de la BD externa.
    # La salud real de Mongo se monitorea vía Prometheus / CloudWatch logs.
    mongo:
      enabled: false
    mongodb:
      enabled: false
    defaults:
      enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
springdoc:
  swagger-ui:
    path: "/swagger-ui.html"
    operationsSorter: "method"
    tagsSorter: "alpha"
    display-request-duration: true
    filter: true
  api-docs:
    path: "/v3/api-docs"
resilience4j:
  circuitbreaker:
    instances:
      mongoCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 2
        permittedNumberOfCallsInHalfOpenState: 2
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 1
        waitDurationInOpenState: 3s
        failureRateThreshold: 50
        recordExceptions:
          - java.lang.Exception
          - com.mongodb.MongoException
