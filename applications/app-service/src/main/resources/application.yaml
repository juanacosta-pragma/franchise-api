server:
  port: 8080
spring:
  application:
    name: "ScaffoldQuickStart"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
  data:
    mongodb:
      # Para Atlas la URI DEBE incluir authSource=admin (los usuarios viven en 'admin').
      # Si se omite, los heartbeats SDAM del driver intentan 'hello' contra 'local'
      # y Atlas responde 8000 (Unauthorized), tirando todas las tasks.
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://127.0.0.1:27017/test?authSource=admin}
      # Pin explícito de la BD para que ningún componente (HealthIndicator,
      # MongoTemplate, change streams, etc.) pueda terminar apuntando a 'local'.
      database: ${SPRING_DATA_MONGODB_DATABASE:test}
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
      # Excluye 'mongo' del agregado de /actuator/health para que un fallo de
      # autorización en Atlas (clusterMonitor) NO marque la task como unhealthy
      # y el ALB no entre en bucle de reinicios. La app sigue conectándose a Mongo;
      # solo se desacopla el estado del cluster del health check del ALB.
      group:
        liveness:
          include: "livenessState"
        readiness:
          include: "readinessState"
  health:
    # Spring Boot 4 reorganizó el módulo Mongo: el ID del indicador puede ser
    # 'mongo' (legacy) o 'mongodb' (nuevo). Deshabilitamos ambos por seguridad.
    mongo:
      enabled: false
    mongodb:
      enabled: false
    defaults:
      enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
springdoc:
  swagger-ui:
    path: "/swagger-ui.html"
    operationsSorter: "method"
    tagsSorter: "alpha"
    display-request-duration: true
    filter: true
  api-docs:
    path: "/v3/api-docs"
resilience4j:
  circuitbreaker:
    instances:
      mongoCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 2
        permittedNumberOfCallsInHalfOpenState: 2
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 1
        waitDurationInOpenState: 3s
        failureRateThreshold: 50
        recordExceptions:
          - java.lang.Exception
          - com.mongodb.MongoException
